name: CI

on:
  push:
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: Orbital

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Orbital/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test
